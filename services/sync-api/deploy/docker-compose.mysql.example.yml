services:
  mysql:
    image: mysql:8.4
    container_name: dolgate-mysql
    restart: unless-stopped
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: dolgate
      MYSQL_USER: dolgate_user
      MYSQL_PASSWORD: CHANGE_ME_PASSWORD
      MYSQL_ROOT_PASSWORD: CHANGE_ME_ROOT_PASSWORD
      TZ: Asia/Seoul
    volumes:
      - dolgate-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-pCHANGE_ME_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  sync-api:
    image: ghcr.io/doldolma/dolgate-sync-api:latest
    container_name: dolgate-sync-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      DB_DRIVER: mysql
      DATABASE_URL: dolgate_user:CHANGE_ME_PASSWORD@tcp(mysql:3306)/dolgate?charset=utf8mb4&parseTime=True&loc=UTC
      TZ: Asia/Seoul
    volumes:
      - dolgate-sync-api-data:/app/data

volumes:
  dolgate-mysql-data:
  dolgate-sync-api-data:
